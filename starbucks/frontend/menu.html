<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order — Starbucks India</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/menu.css" />
</head>
<body class="menu-page">

<div id="page-loader">
  <div class="loader-logo">
    <svg viewBox="0 0 100 100" width="80" height="80">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
      <circle cx="50" cy="50" r="45" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="283" stroke-dashoffset="283" class="loader-circle"/>
    </svg>
    <span>STARBUCKS</span>
  </div>
</div>

<div id="toast-container"></div>

<!-- NAVBAR -->
<nav id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="https://upload.wikimedia.org/wikipedia/en/d/d3/Starbucks_Corporation_Logo_2011.svg" alt="Starbucks" width="44" height="44" />
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="#">Gift</a></li>
      <li><a href="menu.html" class="active">Order</a></li>
      <li><a href="#">Pay</a></li>
      <li><a href="#">Store</a></li>
      <li><a href="#">Corporate Gifting</a></li>
    </ul>
    <div class="nav-actions">
      <div class="search-wrap">
        <input type="text" id="nav-search" placeholder="Looking for something specific?" />
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <a href="login.html" class="nav-icon" title="Account">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <a href="cart.html" class="nav-icon cart-nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" id="cart-count">0</span>
      </a>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<!-- ORDER HEADER BAR -->
<div class="order-header-bar">
  <div class="order-header-inner">
    <div class="store-selector">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span>No Store Selected</span>
    </div>
    <div class="est-time">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>00 mins</span>
    </div>
    <div class="order-mode-toggle">
      <button class="mode-btn active" id="dine-in-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2h18l-2 7H5L3 2z"/><path d="M5 9l1 11h12l1-11"/></svg>
        Dine-In
      </button>
      <button class="mode-btn" id="takeaway-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 11h4l-4-8H8L4 11h4"/><path d="M4 11v8a1 1 0 001 1h14a1 1 0 001-1v-8"/></svg>
        Takeaway
      </button>
    </div>
  </div>
</div>

<!-- CATEGORY TABS -->
<div class="category-tabs-bar" id="category-tabs-bar">
  <div class="category-tabs-inner">
    <button class="cat-tab active" data-cat="bestseller">Bestseller</button>
    <button class="cat-tab" data-cat="drinks">Drinks</button>
    <button class="cat-tab" data-cat="food">Food</button>
    <button class="cat-tab" data-cat="merchandise">Merchandise</button>
    <button class="cat-tab" data-cat="coffee-home">Coffee At Home</button>
    <button class="cat-tab" data-cat="ready-to-eat">Ready to Eat</button>
  </div>
</div>

<!-- SUBCATEGORY + FILTER -->
<div class="sub-filter-bar" id="sub-filter-bar">
  <div class="sub-tabs" id="sub-tabs"></div>
  <div class="filter-chips" id="filter-chips">
    <button class="filter-chip active" data-filter="all">All</button>
    <button class="filter-chip" data-filter="veg">Veg</button>
    <button class="filter-chip" data-filter="non-veg">Non-Veg</button>
    <button class="filter-chip" data-filter="hot">Hot</button>
    <button class="filter-chip" data-filter="cold">Cold</button>
  </div>
</div>

<!-- SEARCH BAR -->
<div class="menu-search-bar">
  <div class="menu-search-inner">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="menu-search" placeholder="Search drinks, food, merchandise..." />
  </div>
</div>

<!-- MENU SECTION TITLE + GRID -->
<main class="menu-main">
  <div class="menu-section-header">
    <h2 id="menu-section-title">Bestseller</h2>
    <p id="menu-section-desc">Everyone's favorite Starbucks put together in a specially curated collection.</p>
  </div>
  <div class="menu-grid" id="menu-grid">
    <!-- Cards injected by JS -->
  </div>
  <div class="no-results" id="no-results" style="display:none;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <p>No items found. Try a different search or filter.</p>
  </div>
</main>

<!-- ITEM DETAIL MODAL -->
<div class="item-modal-overlay" id="item-modal-overlay">
  <div class="item-modal" id="item-modal">
    <button class="modal-close" id="modal-close">×</button>
    <div class="modal-img-wrap">
      <img id="modal-img" src="" alt="" />
    </div>
    <div class="modal-body">
      <div class="modal-veg-badge" id="modal-veg"></div>
      <h2 id="modal-name"></h2>
      <p id="modal-meta" class="modal-meta"></p>
      <div class="modal-allergens" id="modal-allergens"></div>
      <p id="modal-desc" class="modal-desc"></p>
      <p id="modal-taste" class="modal-taste"></p>
      <p class="modal-price" id="modal-price"></p>
      <div class="modal-actions">
        <div class="qty-control">
          <button class="qty-btn" id="modal-minus">−</button>
          <span id="modal-qty">1</span>
          <button class="qty-btn" id="modal-plus">+</button>
        </div>
        <button class="btn-primary ripple" id="modal-add-cart">Add to Cart</button>
      </div>
    </div>
  </div>
</div>

<!-- FLOATING CART BUTTON -->
<a href="cart.html" class="floating-cart" id="floating-cart">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
  <span id="floating-cart-count">0</span>
  <span class="floating-cart-label">View Cart</span>
</a>

<script src="js/app.js"></script>
<script src="js/menu.js"></script>
</body>
</html>
