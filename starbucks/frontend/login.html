<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Starbucks India</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

<div id="toast-container"></div>

<div class="auth-bg">
  <div class="auth-bg-shape shape1"></div>
  <div class="auth-bg-shape shape2"></div>
</div>

<div class="auth-wrapper">
  <a href="index.html" class="auth-logo">
    <img src="https://upload.wikimedia.org/wikipedia/en/d/d3/Starbucks_Corporation_Logo_2011.svg" alt="Starbucks" width="56" />
  </a>

  <!-- TAB SWITCH -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="login-tab">Sign In</button>
    <button class="auth-tab" id="register-tab">Create Account</button>
  </div>

  <!-- LOGIN FORM -->
  <div class="auth-form-wrap" id="login-form-wrap">
    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to your Starbucks account</p>

    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="input-with-eye">
          <input type="password" id="login-password" placeholder="Enter your password" required />
          <button type="button" class="toggle-pw" data-target="login-password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-extra">
        <label class="checkbox-label">
          <input type="checkbox" id="remember-me" />
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-pw">Forgot password?</a>
      </div>
      <button type="submit" class="btn-primary ripple auth-submit">Sign In</button>
    </form>

    <div class="auth-divider"><span>or continue as guest</span></div>
    <a href="menu.html" class="btn-outline" style="width:100%;text-align:center;">Browse as Guest</a>
  </div>

  <!-- REGISTER FORM -->
  <div class="auth-form-wrap" id="register-form-wrap" style="display:none;">
    <h1>Join Starbucks</h1>
    <p class="auth-sub">Create your free account today</p>

    <form id="register-form" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label for="reg-fname">First Name</label>
          <input type="text" id="reg-fname" placeholder="First name" required />
        </div>
        <div class="form-group">
          <label for="reg-lname">Last Name</label>
          <input type="text" id="reg-lname" placeholder="Last name" required />
        </div>
      </div>
      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="reg-phone">Phone Number</label>
        <input type="tel" id="reg-phone" placeholder="+91 98765 43210" />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <div class="input-with-eye">
          <input type="password" id="reg-password" placeholder="Min 8 characters" required />
          <button type="button" class="toggle-pw" data-target="reg-password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="pw-strength" id="pw-strength">
          <div class="pw-bar" id="pw-bar"></div>
        </div>
        <span class="pw-strength-label" id="pw-strength-label"></span>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" required />
          I agree to the <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>
        </label>
      </div>
      <button type="submit" class="btn-primary ripple auth-submit">Create Account</button>
    </form>
  </div>

  <p class="auth-back"><a href="index.html">← Back to Home</a></p>
</div>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
